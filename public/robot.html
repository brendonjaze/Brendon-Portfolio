<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Background</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        spline-viewer {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.59/build/spline-viewer.js"></script>
    <!-- Use the specific robot scene that has cursor tracking built-in -->
    <spline-viewer url="https://prod.spline.design/KPZrgtmWIkABLvsw/scene.splinecode"></spline-viewer>

    <script>
        // Forward mousemove events from INSIDE the iframe back to the parent.
        // The iframe captures real pointer events (so the Spline robot tracks the cursor),
        // and we echo them to the parent so the cursor comet animation keeps working.
        document.addEventListener('mousemove', function (e) {
            window.parent.postMessage({
                type: 'iframe-mousemove',
                x: e.clientX,
                y: e.clientY
            }, '*');
        });
    </script>
</body>

</html>
